name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --frozen --group dev --no-build-isolation-package Fortuna --reinstall-package Fortuna
      - run: uv run --frozen ruff check .
      - run: uv run --frozen ruff format --check .

  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
          - os: ubuntu-latest
            python: "3.13"
          - os: ubuntu-latest
            python: "3.14"
          - os: macos-latest
            python: "3.11"
          - os: macos-latest
            python: "3.14"
          - os: windows-latest
            python: "3.11"
          - os: windows-latest
            python: "3.14"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      - run: uv sync --frozen --group dev --no-build-isolation-package Fortuna --reinstall-package Fortuna
      - run: uv run --frozen pytest -m "not statistical" -n auto

  statistical-tests:
    name: Statistical tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --frozen --group dev --no-build-isolation-package Fortuna --reinstall-package Fortuna
      - run: uv run --frozen pytest -m statistical

  benchmark-smoke:
    name: Benchmark harness smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --frozen --group dev --no-build-isolation-package Fortuna --reinstall-package Fortuna
      - name: Exercise the harness without enforcing timing
        run: >-
          uv run --frozen python -m benchmarks
          --suite reference
          --case random
          --warmups 0
          --samples 2
          --target-ms 1

  build:
    name: Build source distribution and native wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv build --no-sources
      - name: Verify the built wheel in an isolated environment
        shell: bash
        run: |
          wheel="$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$wheel"
          uv venv --python 3.14 .wheel-check
          uv pip install --python .wheel-check/bin/python "$wheel"
          .wheel-check/bin/python -c "from importlib.metadata import version; from pathlib import Path; import Fortuna; root = Path(Fortuna.__file__).parent; assert version('Fortuna') == Fortuna.__version__ == '6.0.0'; assert Fortuna.storm_version() == '5.0.1'; assert (root / '_core.pyi').is_file() and (root / 'py.typed').is_file(); a = Fortuna.Generator(0); b = Fortuna.Generator(0); assert [a.random_int(-10, 10) for _ in range(8)] == [b.random_int(-10, 10) for _ in range(8)]"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ci-dist
          path: dist/*
          if-no-files-found: error
          retention-days: 7
